name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Decode Keystore
      env:
        DEBUG_KEY_BASE64: ${{ secrets.Debug_Key }}
      run: |
        if [ -n "$DEBUG_KEY_BASE64" ]; then
          echo "$DEBUG_KEY_BASE64" | base64 --decode > app/debug.keystore
          echo "Keystore successfully decoded and placed in app/debug.keystore"
        else
          echo "Debug_Key secret is not set, skipping keystore decode."
        fi

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
